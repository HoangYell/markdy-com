name: Release

# Triggers when you push a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub Releases
  packages: write   # needed to publish to GitHub Packages

jobs:
  release:
    name: Publish to npm & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for release notes

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (core + renderer + astro only)
        run: pnpm --filter @markdy/core --filter @markdy/renderer-dom --filter @markdy/astro run build

      - name: Run tests
        run: pnpm --filter @markdy/core run test

      - name: Publish @markdy/core → npmjs.com
        working-directory: packages/core
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @markdy/renderer-dom → npmjs.com
        working-directory: packages/renderer-dom
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @markdy/astro → npmjs.com
        working-directory: packages/astro
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Packages (requires a GitHub Org named 'markdy' to exist) ──
      # Once you create the org at https://github.com/organizations/plan
      # and transfer this repo to it, uncomment the steps below:
      #
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 22
      #     registry-url: "https://npm.pkg.github.com"
      #     scope: "@markdy"
      # - name: Publish @markdy/core → GitHub Packages
      #   working-directory: packages/core
      #   run: pnpm publish --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # - name: Publish @markdy/renderer-dom → GitHub Packages
      #   working-directory: packages/renderer-dom
      #   run: pnpm publish --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # - name: Publish @markdy/astro → GitHub Packages
      #   working-directory: packages/astro
      #   run: pnpm publish --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          body: |
            ## 🎬 Markdy ${{ github.ref_name }}

            **Animation DSL engine — Like Mermaid, but for motion.**

            ### Packages

            | Package | Install |
            |---|---|
            | [`@markdy/core`](https://www.npmjs.com/package/@markdy/core) | `pnpm add @markdy/core` |
            | [`@markdy/renderer-dom`](https://www.npmjs.com/package/@markdy/renderer-dom) | `pnpm add @markdy/renderer-dom` |
            | [`@markdy/astro`](https://www.npmjs.com/package/@markdy/astro) | `pnpm add @markdy/astro` |

            ### Quick Start
            ```sh
            pnpm add @markdy/core @markdy/renderer-dom
            ```

            ### Interactive Playground
            👉 **[markdy.com](https://markdy.com)**
