name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (core + renderer + astro)
        run: pnpm --filter @markdy/core --filter @markdy/renderer-dom --filter @markdy/astro run build

      - name: Run tests
        run: pnpm --filter @markdy/core run test

      - name: Type-check packages
        run: pnpm --filter @markdy/core --filter @markdy/renderer-dom typecheck
